# config/headway.yml
ai:
  base_url: https://api.openai.com/v1
  model: gpt-4o

collectors:
  - type: dingtalk_reports
  - type: dingtalk_todos
  - type: dingtalk_meetings
  - type: local_files
    path: ./issues

publishers:
  - type: markdown_file
    path: ./output

schedule:
  interval_hours: 168
