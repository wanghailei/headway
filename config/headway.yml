# config/headway.yml
ai:
  base_url: https://api.openai.com/v1
  model: gpt-4o

collectors:
  - type: dingtalk_reports
  - type: dingtalk_todos
  # - type: dingtalk_meetings  # needs VideoConference.Conference.Read permission
  - type: local_files
    path: ./issues
  - type: local_files
    path: ./meetings

publishers:
  - type: markdown_file
    path: ./output

schedule:
  interval_hours: 168
