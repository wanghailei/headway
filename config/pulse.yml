# config/pulse.yml
ai:
  base_url: https://api.openai.com/v1
  model: gpt-4o

collectors:
  - type: dingtalk_reports
  - type: dingtalk_todos
  # - type: dingtalk_meetings  # needs VideoConference.Conference.Read permission
  - type: dingtalk_mentions
  - type: local_files
    path: ./issues
  - type: local_files
    path: ./meetings

publishers:
  - type: markdown_file
    path: ./output
  - type: dingtalk_bot_notify
    report_url: ""

schedule:
  interval_hours: 168

dingtalk_bot:
  enabled: true
  notify_user_ids:
    - "065819201429325054"
    - "111963172829418384"
